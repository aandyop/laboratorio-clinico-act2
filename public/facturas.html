<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facturación - Laboratorio</title>

</head>
<body>
    <nav>
        <a href="/pacientes.html">Pacientes</a> | 
        <a href="/examenes.html">Exámenes</a> |

        <a href="/valores.html">Valores Ref.</a>

    <h1>Facturación</h1>
    <form id="factura-form">
        <select id="paciente_id" required><option value="">Paciente...</option></select>
        <input type="number" id="monto_total" step="0.01" placeholder="Monto" required>
        <select id="metodo_pago">
            <option value="Efectivo">Efectivo</option>
            <option value="Tarjeta">Tarjeta</option>
        </select>
        <button type="submit">Facturar</button>
    </form>
    <hr>
    <table id="facturas-table" border="1">
        <thead><tr><th>Fecha</th><th>Paciente</th><th>Monto</th><th>Método</th></tr></thead>
        <tbody></tbody>
    </table>
    <script src="/js/facturas-client.js"></script>
</body>
</html>
