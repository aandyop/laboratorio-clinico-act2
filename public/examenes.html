<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Exámenes - Laboratorio</title>
    <link rel="stylesheet" href="/stylesheets/style.css">
</head>
<body>
    <nav>
        <a href="/pacientes.html">Pacientes</a> | 
        <a href="/examenes.html">Exámenes</a>
    </nav>

    <h1>Registro de Exámenes Clínicos</h1>
    
    <section>
        <h2>Nuevo Examen</h2>
        <form id="examen-form">
            <select id="paciente_id" required>
                <option value="">Seleccione un paciente...</option>
            </select>
            
            <input type="text" id="tipo_examen" placeholder="Ej: Hematología, Glucosa" required>
            <textarea id="resultado" placeholder="Resultado del examen"></textarea>
            <input type="date" id="fecha" required>
            
            <button type="submit">Registrar Examen</button>
        </form>
    </section>

    <hr>

    <section>
        <h2>Historial de Exámenes</h2>
        <table border="1" id="examenes-table">
            <thead>
                <tr>
                    <th>Paciente</th>
                    <th>Tipo</th>
                    <th>Resultado</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>

    <script src="/js/examenes-client.js"></script>
</body>
</html>
