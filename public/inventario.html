    <h1>Valores de Referencia</h1>
    <form id="valores-form">
        <input type="text" id="nombre_examen" placeholder="Examen" required>
        <input type="number" id="valor_minimo" step="0.01" placeholder="Min" required>
        <input type="number" id="valor_maximo" step="0.01" placeholder="Max" required>
        <input type="text" id="unidad" placeholder="Unidad" required>
        <button type="submit">Guardar</button>
    </form>
    <hr>
    <table id="valores-table" border="1">
        <thead><tr><th>Examen</th><th>Rango</th><th>Unidad</th></tr></thead>
        <tbody></tbody>
    </table>
