<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacientes - Laboratorio</title>

</head>
<body>
    <nav>
        <a href="/pacientes.html"><strong>Pacientes</strong></a> | 
        <a href="/examenes.html">Exámenes</a> |

        <a href="/valores.html">Valores Ref.</a>
    </nav>

    <h1>Gestión de Pacientes</h1>
    <section>
        <form id="paciente-form">
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="text" id="cedula" placeholder="Cédula" required>
            <input type="text" id="telefono" placeholder="Teléfono" required>
            <select id="medico_id">
                <option value="">-- Seleccione Médico (Opcional) --</option>
            </select>
            <button type="submit">Guardar Paciente</button>
        </form>
    </section>
    <hr>
    <table id="pacientes-table" border="1">
        <thead>
            <tr>
                <th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Médico</th><th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script src="/js/pacientes-client.js"></script>
</body>
</html>
