<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Valores de Referencia - Laboratorio</title>
    <link rel="stylesheet" href="/stylesheets/style.css">
</head>
<body>
    <nav>
        <a href="/pacientes.html">Pacientes</a> | 
        <a href="/examenes.html">Exámenes</a> |
        <a href="/facturas.html">Facturación</a> |
        <a href="/medicos.html">Médicos</a> |
        <a href="/inventario.html">Inventario</a> |
        <a href="/valores.html"><strong>Valores Ref.</strong></a>
    </nav>

    <h1>Configuración de Valores de Referencia</h1>

    <section>
        <form id="valores-form">
            <input type="text" id="nombre_examen" placeholder="Nombre del Examen (ej: Glucosa)" required>
            <input type="number" id="valor_minimo" step="0.01" placeholder="Valor Mínimo" required>
            <input type="number" id="valor_maximo" step="0.01" placeholder="Valor Máximo" required>
            <input type="text" id="unidad" placeholder="Unidad (ej: mg/dL)" required>
            <button type="submit">Guardar Rango</button>
        </form>
    </section>

    <hr>

    <section>
        <h2>Diccionario de Referencias</h2>
        <table border="1" id="valores-table">
            <thead>
                <tr>
                    <th>Examen</th>
                    <th>Rango Normal</th>
                    <th>Unidad</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>

    <script src="/js/valores-client.js"></script>
</body>
</html>
